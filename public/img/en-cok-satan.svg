<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <defs>
        <radialGradient id="metal" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="20%" stop-color="#e0e0e0"/>
            <stop offset="70%" stop-color="#808080"/>
            <stop offset="100%" stop-color="#333333"/>
        </radialGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.6"/>
        </filter>
        <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#d0d0d0"/>
        </linearGradient>
        <radialGradient id="redMetal" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
            <stop offset="0%" stop-color="#b92b45"/>
            <stop offset="50%" stop-color="#8a1830"/>
            <stop offset="100%" stop-color="#540a1b"/>
        </radialGradient>
    </defs>
    <!-- Outer ring -->
    <circle cx="50" cy="50" r="48" fill="url(#metal)" filter="url(#shadow)"/>
    <!-- Inner dark circle -->
    <circle cx="50" cy="50" r="40" fill="url(#redMetal)"/>
    <!-- Inner metallic ring -->
    <circle cx="50" cy="50" r="38" fill="none" stroke="url(#metal)" stroke-width="1.5"/>
    
    <!-- Text -->
    <g transform="translate(50, 47) rotate(-12)" text-anchor="middle" font-family="'Arial Black', Impact, sans-serif" font-weight="900" filter="url(#shadow)">
        <text y="-5" font-size="20" fill="url(#textGrad)" stroke="#111" stroke-width="1" letter-spacing="-0.5">EN ÇOK</text>
        <text y="18" font-size="26" fill="url(#textGrad)" stroke="#111" stroke-width="1.5" letter-spacing="-1">SATAN</text>
    </g>
</svg>
